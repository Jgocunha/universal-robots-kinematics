name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]
        include:
          - build_type: Debug
            preset: debug
          - build_type: Release
            preset: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Cache the FetchContent source downloads (Eigen, GoogleTest) so runs stay fast.
      # Keyed on OS + build type + the pinned dependency tags; bump the tags here when
      # they change in the CMakeLists files.
      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.deps
          key: deps-${{ matrix.os }}-${{ matrix.build_type }}-eigen-3.4.0-gtest-v1.15.2-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            deps-${{ matrix.os }}-${{ matrix.build_type }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -D FETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test (golden characterization suite)
        run: ctest --test-dir build/${{ matrix.preset }} --build-config ${{ matrix.build_type }} --output-on-failure

      # Smoke test: the demo app must run to completion on its own. Locate the binary
      # (path differs between single-config and multi-config generators) and feed it an
      # empty stdin so it can never block.
      - name: Smoke test (run ur_demo once)
        shell: bash
        run: |
          BIN=$(find "build/${{ matrix.preset }}" -type f \( -name ur_demo -o -name ur_demo.exe \) | head -n 1)
          if [ -z "$BIN" ]; then
            echo "::error::ur_demo executable not found under build/${{ matrix.preset }}"
            exit 1
          fi
          echo "Running $BIN"
          "$BIN" < /dev/null

  coverage:
    name: coverage (ubuntu / Debug)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gcovr
        run: |
          sudo apt-get update
          sudo apt-get install -y gcovr

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.deps
          key: deps-coverage-ubuntu-latest-eigen-3.4.0-gtest-v1.15.2-${{ hashFiles('**/CMakeLists.txt') }}
          restore-keys: |
            deps-coverage-ubuntu-latest-

      # Plain CMake configure (not the debug/release presets): coverage needs its own
      # instrumented build directory, kept out of the ordinary build/debug|release trees.
      # UR_KINEMATICS_COVERAGE scopes --coverage to ur_kinematics + its test suite only
      # (see project_coverage in the top-level CMakeLists.txt), instead of blanket
      # compiler flags that would also instrument FetchContent'd Eigen/GoogleTest.
      - name: Configure (coverage)
        run: |
          cmake -S . -B build/coverage \
                -DCMAKE_BUILD_TYPE=Debug \
                -DUR_KINEMATICS_COVERAGE=ON \
                -D FETCHCONTENT_BASE_DIR=${{ github.workspace }}/.deps

      - name: Build (coverage)
        run: cmake --build build/coverage --parallel

      - name: Test (coverage)
        run: ctest --test-dir build/coverage --output-on-failure

      - name: Generate coverage report
        run: |
          gcovr \
            --root . \
            --filter 'include/.*' --filter 'src/.*' \
            --exclude '.*/tests/.*' \
            --exclude '.*/apps/.*' \
            --exclude-directories '.*_deps.*' \
            --object-directory build/coverage \
            --gcov-ignore-errors=no_working_dir_found \
            --xml \
            -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: unittests
          fail_ci_if_error: false
